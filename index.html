<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTIS RPS 취향표</title>
    <link rel="stylesheet" href="./styles.css?v=20260714-12" />
</head>
<body>

<div class="container">
    <h1>CORTIS RPS 취향표</h1>

    <div class="legend-wrapper" id="legendContainer">
        <button class="btn-add-legend" type="button" aria-label="새 범례 추가">+</button>
    </div>

    <div class="chart-frame">
        <div class="table-shell">
            <table id="rpsTable">
                <thead>
                    <tr><th class="name-col"></th><th class="paintable-name" data-axis="column" data-group-index="0">마틴</th><th class="paintable-name" data-axis="column" data-group-index="1">제임스</th><th class="paintable-name" data-axis="column" data-group-index="2">주훈</th><th class="paintable-name" data-axis="column" data-group-index="3">성현</th><th class="paintable-name" data-axis="column" data-group-index="4">건호</th></tr>
                </thead>
                <tbody>
                    <tr><th class="name-col paintable-name" data-axis="row" data-group-index="0">마틴</th><td class="empty-cell"></td><td class="paintable">젯틴</td><td class="paintable">훈틴</td><td class="paintable">셩띤</td><td class="paintable">껀틴</td></tr>
                    <tr><th class="name-col paintable-name" data-axis="row" data-group-index="1">제임스</th><td class="paintable">틴젯</td><td class="empty-cell"></td><td class="paintable">눟젯</td><td class="paintable">셩젯</td><td class="paintable">낭젯</td></tr>
                    <tr><th class="name-col paintable-name" data-axis="row" data-group-index="2">주훈</th><td class="paintable">틴훈</td><td class="paintable">젯쮸</td><td class="empty-cell"></td><td class="paintable">셩쮼</td><td class="paintable">낭쮼</td></tr>
                    <tr><th class="name-col paintable-name" data-axis="row" data-group-index="3">성현</th><td class="paintable">틴셩</td><td class="paintable">젯셩</td><td class="paintable">쮸엄</td><td class="empty-cell"></td><td class="paintable">낭셩</td></tr>
                    <tr><th class="name-col paintable-name" data-axis="row" data-group-index="4">건호</th><td class="paintable">틴껀</td><td class="paintable">젬껀</td><td class="paintable">쮸건</td><td class="paintable">엄껀</td><td class="empty-cell"></td></tr>
                </tbody>
            </table>
        </div>
        <time class="chart-timestamp" id="chartTimestamp" hidden></time>
    </div>

    <section class="export-panel" aria-label="이미지 저장 설정">
        <label class="timestamp-toggle" for="timestampToggle">
            <input class="timestamp-toggle-input" id="timestampToggle" type="checkbox">
            <span class="timestamp-toggle-control" aria-hidden="true"></span>
            <span>이미지에 날짜 표시</span>
        </label>
        <button class="btn-save-image" id="saveImageButton" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
                <rect x="3.25" y="4.25" width="17.5" height="15.5" rx="3.25"></rect>
                <circle cx="8.25" cy="9" r="1.75"></circle>
                <path d="M4.5 17.25l4.25-4.25a1.5 1.5 0 0 1 2.12 0l1.63 1.63 1.88-1.88a1.5 1.5 0 0 1 2.12 0l3 3"></path>
            </svg>
            <span>이미지 저장</span>
        </button>
    </section>

    <nav class="history-controls" aria-label="편집 이력">
        <button class="history-button" id="undoButton" type="button" aria-label="실행 취소" title="실행 취소 (⌘/Ctrl+Z)" disabled>
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
                <path d="M9 7L4 12l5 5"></path>
                <path d="M5 12h8.25a5.75 5.75 0 0 1 5.75 5.75"></path>
            </svg>
        </button>
        <button class="history-button" id="redoButton" type="button" aria-label="다시 실행" title="다시 실행 (⌘/Ctrl+Shift+Z)" disabled>
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
                <path d="M15 7l5 5-5 5"></path>
                <path d="M19 12h-8.25A5.75 5.75 0 0 0 5 17.75"></path>
            </svg>
        </button>
    </nav>

    <footer class="site-footer">
        <span>&copy; 2026 en-chovy</span>
        <span aria-hidden="true">·</span>
        <a href="https://www.postype.com/@chovhub/post/21315991" target="_blank" rel="noopener noreferrer">문의 및 버그 제보</a>
    </footer>

    <div id="visualPickerPopup" class="ios-popup">
        <div class="picker-container">
            <div class="sat-bright-area" id="sbArea"><div class="picker-cursor" id="pickerCursor"></div></div>
            <input type="range" class="hue-slider" id="hueSlider" min="0" max="360" value="0">
            <input type="range" class="alpha-slider" id="alphaSlider" min="0" max="1" step="0.01" value="0.5">
            <button class="btn-done">완료</button>
        </div>
    </div>
    <div id="cellMenu" class="ios-popup"></div>
</div>

<div class="modal-overlay" id="nameModalOverlay">
    <div class="modal">
        <h3 id="modalTitle">이름 변경</h3>
        <input type="text" id="nameInput" placeholder="이름을 입력하세요">
        <div class="modal-buttons">
            <button class="btn-cancel" type="button">취소</button>
            <button class="btn-save" type="button">저장</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="deleteModalOverlay">
    <div class="modal">
        <h3>범례 삭제</h3>
        <p>이 범례를 정말 삭제할까요?</p>
        <div class="modal-buttons">
            <button class="btn-cancel" type="button">취소</button>
            <button class="btn-save btn-delete" id="confirmDelBtn" type="button">삭제</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="unifiedModalOverlay">
    <div class="modal unified-modal">
        <h3>범례 설정</h3>
        
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="unifiedNameInput" placeholder="이름을 입력하세요">
        </div>
        
        <div class="picker-container">
            <label>색상</label>
            <div class="sat-bright-area" id="unifiedSbArea">
                <div class="picker-cursor" id="unifiedPickerCursor"></div>
            </div>
            <input type="range" class="hue-slider" id="unifiedHueSlider" min="0" max="360" value="0">
            <input type="range" class="alpha-slider" id="unifiedAlphaSlider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="unified-action-buttons">
            <button class="btn-delete-text" id="unifiedDeleteBtn" type="button">범례 삭제</button>
            <div class="right-buttons">
                <button class="btn-cancel" id="unifiedCancelBtn" type="button">취소</button>
                <button class="btn-save" id="unifiedSaveBtn" type="button">확인</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="./app.js?v=20260714-12"></script>

</body>
</html>
