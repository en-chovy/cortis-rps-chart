<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTIS RPS 취향표</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>

<div class="container">
    <h1>CORTIS RPS 취향표</h1>

    <div class="legend-wrapper" id="legendContainer">
        <div class="legend-item" id="item-1">
            <div class="circle-display" id="disp-1" style="background-color: var(--color-1-a);"></div>
            <span class="editable-label" id="label-1">OTP</span>
            <button class="btn-delete-item">✕</button>
        </div>
        <div class="legend-item" id="item-2">
            <div class="circle-display" id="disp-2" style="background-color: var(--color-2-a);"></div>
            <span class="editable-label" id="label-2">좋음</span>
            <button class="btn-delete-item">✕</button>
        </div>
        <div class="legend-item" id="item-3">
            <div class="circle-display" id="disp-3" style="background-color: var(--color-3-a);"></div>
            <span class="editable-label" id="label-3">보통</span>
            <button class="btn-delete-item">✕</button>
        </div>
        <div class="legend-item" id="item-4">
            <div class="circle-display" id="disp-4" style="background-color: var(--color-4-a);"></div>
            <span class="editable-label" id="label-4">스루</span>
            <button class="btn-delete-item">✕</button>
        </div>
        <div class="legend-item" id="item-5">
            <div class="circle-display" id="disp-5" style="background-color: var(--color-5-a);"></div>
            <span class="editable-label" id="label-5">지뢰</span>
            <button class="btn-delete-item">✕</button>
        </div>
        <button class="btn-add-legend">+</button>
    </div>

    <div class="table-shell">
        <table id="rpsTable">
            <thead>
                <tr><th class="name-col"></th><th>마틴</th><th>제임스</th><th>주훈</th><th>성현</th><th>건호</th></tr>
            </thead>
            <tbody>
                <tr><th class="name-col">마틴</th><td class="empty-cell"></td><td class="paintable">젯틴</td><td class="paintable">훈틴</td><td class="paintable">셩띤</td><td class="paintable">낭틴</td></tr>
                <tr><th class="name-col">제임스</th><td class="paintable">틴젯</td><td class="empty-cell"></td><td class="paintable">눟젯</td><td class="paintable">셩젯</td><td class="paintable">낭젯</td></tr>
                <tr><th class="name-col">주훈</th><td class="paintable">틴훈</td><td class="paintable">젯쮸</td><td class="empty-cell"></td><td class="paintable">셩쮼</td><td class="paintable">낭쮼</td></tr>
                <tr><th class="name-col">성현</th><td class="paintable">틴셩</td><td class="paintable">젯셩</td><td class="paintable">쮸엄</td><td class="empty-cell"></td><td class="paintable">낭셩</td></tr>
                <tr><th class="name-col">건호</th><td class="paintable">틴껀</td><td class="paintable">젬껀</td><td class="paintable">쮸건</td><td class="paintable">엄껀</td><td class="empty-cell"></td></tr>
            </tbody>
        </table>
    </div>

    <div id="visualPickerPopup" class="ios-popup">
        <div class="picker-container">
            <div class="sat-bright-area" id="sbArea"><div class="picker-cursor" id="pickerCursor"></div></div>
            <input type="range" class="hue-slider" id="hueSlider" min="0" max="360" value="0">
            <input type="range" class="alpha-slider" id="alphaSlider" min="0" max="1" step="0.01" value="0.5">
            <button class="btn-done">완료</button>
        </div>
    </div>
    <div id="cellMenu" class="ios-popup"></div>
</div>

<div class="modal-overlay" id="nameModalOverlay">
    <div class="modal">
        <h3 id="modalTitle">이름 변경</h3>
        <input type="text" id="nameInput" placeholder="이름을 입력하세요">
        <div class="modal-buttons">
            <button class="btn-cancel">취소</button>
            <button class="btn-save">저장</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="deleteModalOverlay">
    <div class="modal">
        <h3>범례 삭제</h3>
        <p>이 범례를 정말 삭제할까요?</p>
        <div class="modal-buttons">
            <button class="btn-cancel">취소</button>
            <button class="btn-save btn-delete" id="confirmDelBtn">삭제</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="unifiedModalOverlay">
    <div class="modal unified-modal">
        <h3>범례 설정</h3>
        
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="unifiedNameInput" placeholder="이름을 입력하세요">
        </div>
        
        <div class="picker-container">
            <label>색상</label>
            <div class="sat-bright-area" id="unifiedSbArea">
                <div class="picker-cursor" id="unifiedPickerCursor"></div>
            </div>
            <input type="range" class="hue-slider" id="unifiedHueSlider" min="0" max="360" value="0">
            <input type="range" class="alpha-slider" id="unifiedAlphaSlider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="unified-action-buttons">
            <button class="btn-delete-text" id="unifiedDeleteBtn">범례 삭제</button>
            <div class="right-buttons">
                <button class="btn-cancel" onclick="closeModal('unifiedModalOverlay')">취소</button>
                <button class="btn-save" id="unifiedSaveBtn">확인</button>
            </div>
        </div>
    </div>
</div>

<script src="./app.js"></script>

</body>
</html>
